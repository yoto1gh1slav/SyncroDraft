<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

    <h2>SyncroDraft 3D Визуализация</h2>

    <model-viewer 
    src="./super_model.glb" 
    ar 
    camera-controls 
    auto-rotate 
    crossorigin="anonymous"
    shadow-intensity="1" 
    style="width: 100%; height: 80vh;">
    <div slot="poster" style="text-align: center; color: white; padding-top: 50px;">
        🚀 Синхронизиране на 3D геометрията... <br> 
        (ако се забави, опитайте Ctrl + F5)
    </div>
</model-viewer>

</body>
</html>
