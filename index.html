<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
    </style>
</head>
<body>

   <model-viewer 
    src="final_model.glb" 
    ar 
    camera-controls 
    auto-rotate 
    shadow-intensity="2" 
    environment-image="neutral" 
    exposure="1"
    bounds="tight"
    style="width: 100%; height: 90vh; background-color: #333333;">
    <div slot="poster" style="color: white; text-align: center; padding-top: 20%; font-family: sans-serif;">
        🏗️ Синхронизиране на SolidWorks геометрия... <br>
        (Ако не се вижда, опитайте Zoom Out)
    </div>
</model-viewer>





</body>
</html>
