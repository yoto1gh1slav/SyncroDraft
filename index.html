<!DOCTYPE html>
<html lang="en">
<head>
    <title>SyncroDraft: Mission AR 🚀</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Зареждане на 3D двигателя -->
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f0f2f5; }
        model-viewer { width: 95%; height: 85vh; background-color: #ffffff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); --poster-color: transparent; }
        .header { position: absolute; top: 20px; text-align: center; z-index: 10; width: 100%; }
        h1 { margin: 0; color: #1a73e8; font-size: 1.5rem; text-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .footer { position: absolute; bottom: 15px; color: #5f6368; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SyncroDraft: Mission AR 🚀</h1>
    </div>

    <!-- Твоят детайл от SolidWorks се зарежда тук -->
   <model-viewer src="detal1.STL" 
              ar ar-modes="webxr scene-viewer quick-look" 
              camera-controls 
              shadow-intensity="1" 
              auto-rotate 
              style="width: 100%; height: 100%;">
</model-viewer>


    <div class="footer">Engineering Visualization by Yordanka</div>
</body>
</html>
