<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background-color: #f0f0f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

    <h2 style="font-family: Arial; color: #333;">SyncroDraft 3D Визуализация</h2>

    <!-- Използваме директния линк към файла в хранилището -->
    <model-viewer 
        src="https://raw.githubusercontent.com" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        exposure="1.2"
        environment-image="neutral"
        style="width: 100%; height: 80vh;">
        <div slot="poster" style="text-align: center; padding-top: 50px; font-family: Arial;">
            🚀 Свързване със сървъра на SyncroDraft... <br> (моля изчакайте 10-15 сек)
        </div>
    </model-viewer>

</body>
</html>
