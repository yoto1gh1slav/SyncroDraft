<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SyncroDraft: Мисия AR</title>
    <!-- Нов адрес на скрипта за по-добра съвместимост -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
      body { margin: 0; background: #eee; }
      model-viewer { width: 100%; height: 100vh; display: block; }
    </style>
  </head>
  <body>

   <model-viewer 
    src="detal1.glb" 
    ar 
    camera-controls 
    auto-rotate 
    loading="eager"
    interpolation-decay="200"
    powerPreference="high-performance"
    style="width: 100%; height: 90vh; background-color: #ffffff;">
    <div slot="poster" style="text-align: center; padding-top: 20%; font-family: sans-serif;">
        <p>⚙️ Обработка на SolidWorks геометрия...</p>
        <p style="font-size: 0.8em; color: #888;">Ако файлът е голям, може да отнеме до 30 сек.</p>
    </div>
</model-viewer>


  </body>
</html>
