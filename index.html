<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SyncroDraft: Mission AR 🚀</title>
    <!-- Това е двигателят -->
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; }
        model-viewer { width: 95%; height: 85%; background: white; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <h1>SyncroDraft: Mission AR 🚀</h1>

    <!-- ТУК Е ПЪЛНИЯТ ПЪТ ДО ТВОЯ ФАЙЛ -->
    <model-viewer 
        src="https://raw.githubusercontent.com" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls auto-rotate shadow-intensity="1">
    </model-viewer>

    <p>Engineering Visualization by Yordanka</p>
</body>
</html>
