<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>SyncroDraft: Мисия AR</title>
    <!-- Използваме Google Model Viewer - най-сигурният за .glb -->
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background: #222;">

    <model-viewer 
        src="super_model.glb" 
        ar 
        camera-controls 
        auto-rotate 
        exposure="1.5"
        shadow-intensity="1"
        environment-image="neutral"
        style="width: 100%; height: 100vh;">
        <div slot="poster" style="color: white; text-align: center; padding-top: 50px;">
            ⚙️ Синхронизиране на super_model.glb...
        </div>
    </model-viewer>

</body>
</html>
