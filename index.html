<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background: #ffffff;">

    <!-- Добавихме environment-image и exposure, за да "светнем" модела -->
    <model-viewer 
        src="detal1.stl" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        environment-image="neutral"
        exposure="1.5"
        style="width: 100%; height: 100vh;">
        
        <div slot="poster" style="text-align: center; margin-top: 50px; font-family: Arial;">
            <p>🚀 Мисия AR: Зареждане...</p>
            <p style="font-size: 12px; color: #888;">(Ако не виждате модела, файлът е празен)</p>
        </div>
    </model-viewer>

</body>
</html>
