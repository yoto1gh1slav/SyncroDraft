<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <!-- Основната библиотека за 3D -->
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; background-color: #222; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        model-viewer { width: 100%; height: 85vh; background-color: #333; }
        .footer { padding: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <h3>SyncroDraft: Визуализация на super_model.glb</h3>

    <!-- ТУК Е ПОСОЧЕН ФАЙЛЪТ: src="super_model.glb" -->
    <model-viewer 
        src="./super_model.glb" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        exposure="1.5"
        environment-image="neutral"
        alt="3D детайл от SolidWorks">
        
        <div slot="poster" style="text-align: center; padding-top: 100px;">
            ⚙️ Зареждане на файла: super_model.glb... <br>
            (Ако се бави, опитайте Ctrl + F5)
        </div>
    </model-viewer>

    <div class="footer">Мисия AR: Активна</div>

</body>
</html>
