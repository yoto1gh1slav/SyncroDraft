<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

    <h2>SyncroDraft 3D Визуализация</h2>

    <model-viewer 
        src="https://yoto1gh1slav.github.io" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        style="width: 100%; height: 80vh;">
        <div slot="poster" style="text-align: center; padding-top: 50px;">
            ⚙️ Зареждане на детайла от сървъра... <br> 
            (моля изчакайте 15-20 сек)
        </div>
    </model-viewer>

</body>
</html>
