<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; background: #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
    </style>
</head>
<body>

    <model-viewer 
        src="final_model.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1"
        alt="3D модел от SolidWorks">
        <div slot="poster" style="text-align: center; padding-top: 50px;">
            🚀 Зареждане на детайла... <br> (ако е празно, натиснете Ctrl + F5)
        </div>
    </model-viewer>

</body>
</html>
