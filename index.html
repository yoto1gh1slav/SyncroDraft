<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; background: #f5f5f5; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        model-viewer { width: 100%; height: 90vh; background-color: #ffffff; }
        h1 { position: absolute; top: 10px; font-size: 1.2rem; color: #333; z-index: 10; }
    </style>
</head>
<body>

    <h1>SyncroDraft: 3D Модел</h1>

    <model-viewer 
        src="detal1.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        alt="3D детайл от SolidWorks">
    </model-viewer>

</body>
</html>
