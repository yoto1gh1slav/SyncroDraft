<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        model-viewer { width: 100%; height: 90vh; --poster-color: transparent; }
    </style>
</head>
<body>

    <model-viewer 
        src="super_model.glb" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="2"
        exposure="1.5"
        environment-image="neutral"
        bounds="tight"
        alt="3D модел от SolidWorks">
        <div slot="poster" style="text-align: center; padding-top: 50px;">
            ⚙️ Синхронизиране на super_model.glb... <br>
            (Моля, изчакайте 5-10 сек)
        </div>
    </model-viewer>

    <div style="padding-bottom: 10px;">SyncroDraft: Мисия AR - Онлайн</div>

</body>
</html>
