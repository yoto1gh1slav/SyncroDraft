<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>SyncroDraft: Мисия AR</title>
    <!-- Използваме Google Model Viewer - по-лек и модерен -->
    <script type="module" src="https://ajax.googleapis.com"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f3f3f3; font-family: sans-serif; }
        model-viewer { width: 100%; height: 80%; background-color: #eee; }
        .controls { padding: 20px; text-align: center; }
        .btn { padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <model-viewer src="detal1.stl" auto-rotate camera-controls shadow-intensity="1" alt="3D Model">
        <div slot="poster" style="display:flex; align-items:center; justify-content:center; height:100%;">
            <p>Зареждане на 3D модел...</p>
        </div>
    </model-viewer>

    <div class="controls">
        <h3>SyncroDraft: Мисия AR</h3>
        <p>Ако моделът не се вижда горе, използвай бутона:</p>
        <a href="detal1.stl" class="btn">Изтегли detal1.stl</a>
    </div>

</body>
</html>
