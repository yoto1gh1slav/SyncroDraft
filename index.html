<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SyncroDraft: Мисия AR</title>
    <script type="module" src="https://ajax.googleapis.com"></script>
</head>
<body style="margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">

    <h2>SyncroDraft 3D Визуализация</h2>

    <!-- Използваме директния RAW адрес на GitHub за детайла -->
    <model-viewer 
        src="https://raw.githubusercontent.com" 
        ar 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        style="width: 100%; height: 80vh;">
        <div slot="poster" style="text-align: center;">
            🚀 Зареждане на детайла от сървъра... <br> 
            Ако се бави, натиснете Ctrl + F5.
        </div>
    </model-viewer>

</body>
</html>
