<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SyncroDraft: Мисия AR</title>
    <!-- Нов адрес на скрипта за по-добра съвместимост -->
    <script type="module" src="https://unpkg.com"></script>
    <style>
      body { margin: 0; background: #eee; }
      model-viewer { width: 100%; height: 100vh; display: block; }
    </style>
  </head>
  <body>

    <!-- Тук използваме твоя нов файл без Draco компресия -->
    <model-viewer 
      src="detal1.glb" 
      ar 
      camera-controls 
      auto-rotate 
      alt="3D модел от SolidWorks">
      <div slot="poster" style="text-align: center; padding-top: 50px;">
        ⚙️ Зареждане на детайла... Моля, изчакайте малко.
      </div>
    </model-viewer>

  </body>
